[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "reins"
version = "0.0.0"
description = "A lightweight agent harness you bolt onto an existing app so an LLM can operate it (CRUD + actions) safely and cheaply."
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "shamspias", email = "shamsuddinpias0@gmail.com" }]
keywords = ["llm", "agent", "harness", "anthropic", "crud", "orm"]
classifiers = [
    "Development Status :: 1 - Planning",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = []

[project.optional-dependencies]
dev = [
    "ruff>=0.6",
    "mypy>=1.11",
    "pytest>=8.0",
    "pre-commit>=3.7",
    "pyyaml>=6.0",       # parse spec/conformance/cases/*.yaml (test-only)
]
anthropic = ["anthropic>=0.40"]   # optional: the AnthropicModel adapter (M1.2)

[tool.hatch.build.targets.wheel]
packages = ["src/reins"]

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]

[tool.mypy]
python_version = "3.11"
strict = true
files = ["src"]
warn_unused_configs = true

# The anthropic SDK is an optional extra, not installed in the dev/CI env; the
# adapter imports it lazily. Treat it as untyped at the boundary.
[[tool.mypy.overrides]]
module = ["anthropic", "anthropic.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
